# .github/workflows/ci.yml
name: CI Demo  # 工作流名称
on: [push]     # 触发事件：代码 push 时运行

jobs:
  build:
    runs-on: ubuntu-latest  # 运行环境：最新 Ubuntu
    steps:
      # 步骤1：拉取仓库代码（官方 Action）
      - name: Checkout code
        uses: actions/checkout@v5

      # 步骤2：设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 步骤3：安装依赖、运行测试
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
